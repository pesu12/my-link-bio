<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Links</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="page">
        <section class="container card">
            <a class="nav-link" href="/about">About</a>
            <h1>My Links</h1>
            <form class="link-form" action="/add" method="POST">
                <input type="text" name="site_name" placeholder="Site name" required>
                <input type="url" name="site_url" placeholder="https://example.com" required>
                <button type="submit">Add Link</button>
            </form>
            <ul class="link-list">
                {% for link in links %}
                <li class="link-item">
                    <div class="link-card-content">
                        <a href="{{ link.url }}">{{ link.name }}</a>
                        <div class="metadata-grid">
                            <div class="metadata-row">
                                <span class="metadata-label">Title</span>
                                <span class="metadata-value">{{ link.title }}</span>
                            </div>
                            <div class="metadata-row">
                                <span class="metadata-label">Description</span>
                                <span class="metadata-value">{{ link.description }}</span>
                            </div>
                            <div class="metadata-row">
                                <span class="metadata-label">Image URL</span>
                                <span class="metadata-value">{{ link.image_url }}</span>
                            </div>
                        </div>
                    </div>
                    <div class="link-actions">
                        <a class="edit-button" href="{{ url_for('edit_link', link_index=loop.index0) }}">Edit</a>
                        <form action="{{ url_for('delete_link', link_index=loop.index0) }}" method="POST">
                            <button class="delete-button" type="submit">Delete</button>
                        </form>
                    </div>
                </li>
                {% endfor %}
            </ul>
        </section>
    </main>
</body>
</html>
